services:
  sonarr-anime:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    image: lscr.io/linuxserver/sonarr:4.0.19
    container_name: sonarr-anime
    networks:
      docker_network:
        ipv4_address: ${IP_SONARR_ANIME}
    ports:
      - "${SONARR_ANIME_EXT_PORT}:${SONARR_ANIME_INT_PORT}"
    volumes:
      - '${DOCKERDIR}/appdata/sonarr_anime:/config'
      - '${DATADIR}/data:/data'
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
