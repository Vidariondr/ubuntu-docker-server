services:
  radarr-anime:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: radarr-anime
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      docker_network:
        ipv4_address: ${IP_RADARR_ANIME}
    ports:
      - "${RADARR_ANIME_EXT_PORT}:${RADARR_ANIME_INT_PORT}"
    volumes:
      - '${DOCKERDIR}/appdata/radarr_anime:/config'
      - '${DATADIR}/data:/data'
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
